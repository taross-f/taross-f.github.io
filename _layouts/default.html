<!DOCTYPE html>
<html>
  <head>
    {% include analytics.html %}
    <script>
      // 言語データをJavaScriptに渡す
      window.i18nData = {{ site.data.strings | jsonify }};
    </script>
    <title>
      {% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} –
      {{ site.description }}
    </title>
    <link
      href="https://fonts.googleapis.com/css?family=Roboto&display=swap"
      rel="stylesheet"
    />
    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link
      rel="stylesheet"
      type="text/css"
      href="{{ site.baseurl }}/style.css"
    />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="{{ site.name }} - {{ site.description }}"
      href="{{ site.baseurl }}/feed.xml"
    />
    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
    <link
      href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
      rel="stylesheet"
    />
    <script
      async
      src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"
    ></script>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({
        google_ad_client: "ca-pub-2459475264623596",
        enable_page_level_ads: true
      });
    </script>
  </head>

  <body>
    <div class="bg-fx" aria-hidden="true">
      <div class="bg-fx__blob bg-fx__blob--a"></div>
      <div class="bg-fx__blob bg-fx__blob--b"></div>
      <div class="bg-fx__blob bg-fx__blob--c"></div>
      <div class="bg-fx__grid"></div>
      <canvas class="bg-fx__particles" id="bg-particles"></canvas>
    </div>

    <div class="wrapper-masthead" data-parallax="0.25">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar">
            <img src="{{ site.avatar }}" />
          </a>

          <div class="site-info">
            <h1 class="site-name">
              <a href="{{ site.baseurl }}/">{{ site.name }}</a>
            </h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/" data-i18n="nav.blog">Blog</a>
            <a href="{{ site.baseurl }}/about" data-i18n="nav.profile">Profile</a>
            <a href="{{ site.baseurl }}/apps" data-i18n="nav.apps">Apps</a>
            <a href="{{ site.baseurl }}/tags" data-i18n="nav.tags">Tags</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    <script>
      // Google Analytics イベントトラッキング用関数
      function trackToolEvent(toolName, action, value) {
        if (typeof gtag !== 'undefined') {
          gtag('event', action, {
            'event_category': toolName + '_usage',
            'event_label': toolName,
            'value': value || 0
          });
        }
      }

      // 自動言語検出機能
      class AutoLanguageDetector {
        constructor() {
          this.supportedLanguages = ['ja', 'en'];
          this.defaultLanguage = 'ja';
          this.currentLang = this.detectLanguage();
          this.init();
        }

        init() {
          document.addEventListener('DOMContentLoaded', () => {
            this.applyLanguage(this.currentLang);
          });
        }

        detectLanguage() {
          // まずlocalStorageをチェック
          const storedLang = localStorage.getItem('preferred-language');
          if (storedLang && this.supportedLanguages.includes(storedLang)) {
            return storedLang;
          }

          // ブラウザの言語設定を取得
          const browserLangs = navigator.languages || [navigator.language || navigator.userLanguage];
          
          // ブラウザの言語リストから対応言語を検出
          for (const lang of browserLangs) {
            const primaryLang = lang.split('-')[0].toLowerCase();
            if (this.supportedLanguages.includes(primaryLang)) {
              localStorage.setItem('preferred-language', primaryLang);
              return primaryLang;
            }
          }
          
          // 対応言語が見つからない場合はデフォルト言語
          localStorage.setItem('preferred-language', this.defaultLanguage);
          return this.defaultLanguage;
        }

        applyLanguage(lang) {
          document.documentElement.lang = lang;
          
          // data-i18n属性を持つ要素を更新
          const elements = document.querySelectorAll('[data-i18n]');
          elements.forEach(element => {
            const key = element.dataset.i18n;
            const text = this.getTranslation(key, lang);
            if (text) {
              element.textContent = text;
            }
          });
          
          // data-i18n-placeholder属性を持つ要素を更新
          const placeholderElements = document.querySelectorAll('[data-i18n-placeholder]');
          placeholderElements.forEach(element => {
            const key = element.dataset.i18nPlaceholder;
            const text = this.getTranslation(key, lang);
            if (text) {
              element.placeholder = text;
            }
          });
          
          // data-i18n-title属性を持つ要素を更新
          const titleElements = document.querySelectorAll('[data-i18n-title]');
          titleElements.forEach(element => {
            const key = element.dataset.i18nTitle;
            const text = this.getTranslation(key, lang);
            if (text) {
              element.title = text;
            }
          });
        }

        getTranslation(key, lang) {
          const keys = key.split('.');
          let result = window.i18nData[lang];
          
          for (const k of keys) {
            if (result && result[k]) {
              result = result[k];
            } else {
              return null;
            }
          }
          
          return result;
        }

        getCurrentLanguage() {
          return this.currentLang;
        }
      }

      // 自動言語検出のインスタンスを作成
      window.autoLanguageDetector = new AutoLanguageDetector();

      // 翻訳取得のヘルパー関数
      window.i18n = function(key) {
        return window.autoLanguageDetector.getTranslation(key, window.autoLanguageDetector.getCurrentLanguage()) || key;
      };

      (function initFrontFx() {
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        // タッチデバイスやコア数の少ない環境では描画コストの高いパーティクルを省略
        const isCoarsePointer = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
        const lowCores = (navigator.hardwareConcurrency || 4) < 4;
        const enableParticles = !reduceMotion && !isCoarsePointer && !lowCores;

        const canvas = document.getElementById('bg-particles');
        if (enableParticles && canvas && canvas.getContext) {
          const ctx = canvas.getContext('2d');
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const LINK_DIST = 110;
          const LINK_DIST_SQ = LINK_DIST * LINK_DIST;
          let width = 0;
          let height = 0;
          let particles = [];
          let pointer = null;
          let visible = true;
          let resizeTimer = 0;

          function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const target = Math.min(60, Math.max(20, Math.floor((width * height) / 32000)));
            particles = new Array(target).fill(0).map(() => ({
              x: Math.random() * width,
              y: Math.random() * height,
              vx: (Math.random() - 0.5) * 0.3,
              vy: (Math.random() - 0.5) * 0.3,
              r: Math.random() * 1.6 + 0.6
            }));
          }

          function step() {
            if (!visible) {
              requestAnimationFrame(step);
              return;
            }
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
              const p = particles[i];
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < -10) p.x = width + 10;
              if (p.x > width + 10) p.x = -10;
              if (p.y < -10) p.y = height + 10;
              if (p.y > height + 10) p.y = -10;

              if (pointer) {
                const dxp = p.x - pointer.x;
                const dyp = p.y - pointer.y;
                const dp2 = dxp * dxp + dyp * dyp;
                if (dp2 < LINK_DIST_SQ) {
                  const f = (1 - dp2 / LINK_DIST_SQ) * 0.6;
                  p.x += (dxp / Math.sqrt(dp2 || 1)) * f;
                  p.y += (dyp / Math.sqrt(dp2 || 1)) * f;
                }
              }

              ctx.beginPath();
              ctx.fillStyle = 'rgba(102, 126, 234, 0.55)';
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fill();
            }

            for (let i = 0; i < particles.length; i++) {
              for (let j = i + 1; j < particles.length; j++) {
                const a = particles[i];
                const b = particles[j];
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < LINK_DIST_SQ) {
                  const alpha = (1 - d2 / LINK_DIST_SQ) * 0.35;
                  ctx.strokeStyle = 'rgba(118, 75, 162, ' + alpha.toFixed(3) + ')';
                  ctx.lineWidth = 1;
                  ctx.beginPath();
                  ctx.moveTo(a.x, a.y);
                  ctx.lineTo(b.x, b.y);
                  ctx.stroke();
                }
              }
            }
            requestAnimationFrame(step);
          }

          window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resize, 150);
          });
          window.addEventListener('pointermove', (e) => {
            pointer = { x: e.clientX, y: e.clientY };
          });
          window.addEventListener('pointerleave', () => {
            pointer = null;
          });
          if ('IntersectionObserver' in window) {
            new IntersectionObserver(([entry]) => {
              visible = entry.isIntersecting;
            }).observe(canvas);
          }
          resize();
          requestAnimationFrame(step);
        }

        if (reduceMotion) return;

        const parallaxTargets = Array.from(document.querySelectorAll('[data-parallax]')).map((node) => ({
          node,
          factor: parseFloat(node.dataset.parallax) || 0
        }));
        const blobTargets = Array.from(document.querySelectorAll('.bg-fx__blob')).map((node, i) => ({
          node,
          factor: 0.05 + i * 0.04
        }));
        let scrollY = window.scrollY;
        let ticking = false;

        function applyParallax() {
          for (const { node, factor } of parallaxTargets) {
            node.style.transform = 'translate3d(0,' + (-scrollY * factor).toFixed(2) + 'px,0)';
          }
          for (const { node, factor } of blobTargets) {
            node.style.transform = 'translate3d(0,' + (-scrollY * factor).toFixed(2) + 'px,0)';
          }
          ticking = false;
        }

        window.addEventListener('scroll', () => {
          scrollY = window.scrollY;
          if (!ticking) {
            requestAnimationFrame(applyParallax);
            ticking = true;
          }
        }, { passive: true });

        if ('IntersectionObserver' in window) {
          const io = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                io.unobserve(entry.target);
              }
            });
          }, { rootMargin: '0px 0px -10% 0px', threshold: 0.05 });

          document.querySelectorAll('.reveal, .posts > .post').forEach((el) => io.observe(el));
        }
      })();

      // ページ読み込み時にツールページを検出
      window.addEventListener('DOMContentLoaded', function() {
        const path = window.location.pathname;
        const toolPages = [
          'character-counter',
          'base64-tool',
          'json-formatter',
          'jwt-analyzer',
          'css-compressor',
          'uuid-generator',
          'color-palette',
          'qr-generator',
          'quote-generator',
          'unicode-converter',
          'url-encoder',
          'pfx-pem-converter'
        ];

        for (const tool of toolPages) {
          if (path.includes(tool)) {
            trackToolEvent(tool, 'page_view');
            break;
          }
        }
      });
    </script>
  </body>
</html>
